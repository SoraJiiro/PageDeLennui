<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Faire un Don - PDE</title>
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
        <link rel="stylesheet" href="css/common.css">
        <link rel="stylesheet" href="css/sidebar.css">
        <link rel="stylesheet" href="css/dons.css">
        <script defer src="/socket.io/socket.io.js"></script>
        <script defer src="js/annexBack.js"></script>
        <script defer type="text/javascript" src="js/uiColor.js"></script>
        <script defer type="text/javascript" src="js/nav.js"></script>
        <script defer type="text/javascript" src="js/auto_reload.js"></script>
        <link rel="icon" type="img/png" href="imgs/icon_d.png"
            media="(prefers-color-scheme: dark)" />
        <link rel="icon" type="img/png" href="imgs/icon_l.png"
            media="(prefers-color-scheme: light)" />
    </head>
    <body class="don-page">
        <main class="donation-container container">
            <h1><i class="fa-solid fa-hand-holding-dollar"></i> Faire un
                don</h1>

            <div class="form-group">
                <label for="recipientSelect"><i class="fa-solid fa-user"></i>
                    Destinataire</label>
                <select id="recipientSelect">
                    <option value>Chargement...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="amountInput"><i class="fa-solid fa-coins"></i>
                    Montant</label>
                <input type="number" id="amountInput"
                    placeholder="Quantité de monnaie" min="1">
            </div>

            <button class="btn don-submit" id="btnSendDonation">Envoyer la
                Monnaie</button>

            <p class="info-msg"><i class="fa-solid fa-circle-info"></i> Tous les
                dons requièrent une validation admin.</p>
        </main>

        <script src="js/pages/dons.page.js"></script>
    </body>
</html>
