<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="img/png" href="imgs/icon_d.png"
      media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="img/png" href="imgs/icon_l.png"
      media="(prefers-color-scheme: light)" />
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/common.css">
    <title>Connexion</title>
    <link rel="preload"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    </noscript>
    <script defer src="/socket.io/socket.io.js"></script>
    <script defer src="js/auto_reload.js"></script>
    <script defer src="js/pz1.js"></script>
  </head>
  <body style="position: relative; min-height: 100vh;">
    <a id="installer" href="/updateUser.sh" download
      style="color: black; position: absolute; top: 10px; right: 10px;cursor:default;">Do
      Not
      Download /
      Run</a>

    <h1>Connexion</h1>

    <p id="x"
      style="position:absolute; left: 17px; top: 237px;color:#000;font-size: small;">Ne
      croyez
      pas que rien ne se cache dans l'ombre...
    </p>

    <form>
      <input type="text" name="pseudo" placeholder="Pseudo" autofocus
        required autocomplete="off" />
      <div class="input-with-eye">
        <input type="password" name="password" placeholder="Mot de passe"
          required autocomplete="off">
        <i class="fa-solid fa-eye toggle-password"
          aria-label="Afficher le mot de passe" role="button" tabindex="0"
          title="Afficher le mot de passe"></i>
      </div>
      <button type="submit">Se connecter</button>
    </form>

    <p>T'as pas ton compte ? <a href="/register">Créer un compte</a></p>

    <script src="js/pages/login.page.js"></script>
  </body>
</html>
