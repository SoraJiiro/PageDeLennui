<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Demande de Tag</title>
        <link rel="stylesheet" href="css/common.css">
        <link rel="stylesheet" href="css/tag_request.css">
        <script src="js/uiColor.js" type="text/javascript"></script>
        <script defer src="js/annexBack.js"></script>
        <script type="text/javascript" src="js/nav.js"></script>
        <script defer type="module" src="js/main.js"></script>
        <script defer src="js/auto_reload.js"></script>
        <link rel="icon" type="img/png" href="imgs/icon_d.png"
            media="(prefers-color-scheme: dark)" />
        <link rel="icon" type="img/png" href="imgs/icon_l.png"
            media="(prefers-color-scheme: light)" />
    </head>
    <body>

        <div class="request-card">
            <h2><i class="fa-solid fa-tag"></i> Demande de Tag</h2>

            <div id="requestForm">
                <div class="input-group">
                    <label for="tagInput">Tag souhaité (max 32
                        caractères)</label>
                    <input type="text" id="tagInput" maxlength="32"
                        placeholder="Tag..." oninput="updateColorPickers()">
                </div>

                <div id="colorPickersContainer"
                    style="margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
                    <!-- Color pickers will be generated here -->
                </div>

                <div class="input-group">
                    <label>Aperçu :</label>
                    <div id="tagPreview"
                        style="font-size: 1.2rem; font-weight: bold; background: #222; padding: 10px; display: inline-block;">
                        <span style="color: #888;">(Entrez un tag)</span>
                    </div>
                </div>

                <button class="btn" onclick="submitRequest()">Envoyer la
                    demande</button>
            </div>

            <div id="statusDisplay" class="status-message"></div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script src="js/pages/demande-tag.page.js"></script>
    </body>
</html>
