<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel='icon' type="img/png" href="imgs/icon_d.png"
      media="(prefers-color-scheme: dark)" />
    <link rel='icon' type="img/png" href="imgs/icon_l.png"
      media="(prefers-color-scheme: light)" />
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/common.css">
    <title>Inscription</title>
    <link rel="preload"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    </noscript>
    <script defer src="/socket.io/socket.io.js"></script>
    <script defer src="js/auto_reload.js"></script>
  </head>
  <body>
    <h1>Inscription</h1>

    <form>
      <p class="info-register"><span style="font-style: normal;">[⚠️]</span> Le
        pseudo <mark
          style="background: var(--primary-color)!important; color: #000!important; padding: 7px 7px">doit
          contenir ton prénom</mark> obligatoirement.
        Sinon...
        <mark
          style="background: var(--primary-color)!important; color: #000!important; padding: 7px 7px">BAN</mark></p>
      <input type="text" name="pseudo" placeholder="Pseudo" autofocus
        required autocomplete="off" />
      <div class="input-with-eye">
        <input type="password" name="password" placeholder="Mot de passe"
          required autocomplete="off">
        <i class="fa-solid fa-eye toggle-password"
          aria-label="Afficher le mot de passe" role="button" tabindex="0"
          title="Afficher le mot de passe"></i>
      </div>
      <button type="submit">Créer un compte</button>
    </form>

    <p>T'as ton compte ? <a href="/login">Se connecter</a></p>

    <script src="js/pages/register.page.js"></script>
  </body>
</html>
