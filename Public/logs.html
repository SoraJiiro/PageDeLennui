<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Logs Serveur</title>
        <link rel="stylesheet" type="text/css" href="/css/common.css" />
        <link rel="stylesheet" type="text/css" href="/css/logs.css" />
        <script src="/js/uiColor.js" type="text/javascript"></script>
        <link rel="icon" type="img/png" href="imgs/icon_d.png"
            media="(prefers-color-scheme: dark)" />
        <link rel="icon" type="img/png" href="imgs/icon_l.png"
            media="(prefers-color-scheme: light)" />
        <style> 
            ::-webkit-scrollbar {
                display: none;
            }
        </style>
    </head>
    <body>
        <ul class="bar">
            <li class="title"><strong>Logs</strong></li>
            <li><span class="pill filter" data-lvl="action">ACTION</span></li>
            <li><span class="pill filter" data-lvl="log">LOG</span></li>
            <li class="controls">
                <button id="autoscroll" class="pill active">Auto-scroll</button>
            </li>
        </ul>
        <div id="logs" class="logs"></div>

        <script src="/socket.io/socket.io.js"></script>
        <script src="../js/pages/logs.page.js"></script>
    </body>
</html>
